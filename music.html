<!DOCTYPE html>

    <title>Music | Daniel Meschino</title>

    <link rel="icon" href="img/core-img/favicon.ico">
    <link rel="stylesheet" href="style.css">

    <style>
        .nav-brand {
            color: #ffffff !important;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .music-section {
            padding: 100px 0;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px;
        }

        .music-card {
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .music-card:hover {
            transform: translateY(-5px);
        }

        .music-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .music-card h3 {
            margin: 15px 0 5px;
            color: #fff;
        }

        .music-card a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #fff;
            color: #000;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .music-card a:hover {
            opacity: 0.8;
        }
    </style>
</head>
