<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Daniel Meschino Music Artist Website">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daniel Meschino</title>

    <link rel="icon" href="img/core-img/favicon.ico">
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        html { scroll-behavior: smooth; }
        body { overflow-x: hidden; }

        /* HEADER */
        .header-area {
            position: absolute;
            width: 100%;
            z-index: 9999;
        }

        .oneMusic-main-menu {
            background: transparent !important;
        }

        .nav-brand {
            color: #fff !important;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .brand-wrapper {
            display: flex;
            flex-direction: column;
        }

        .social-icons {
            margin-top: 5px;
            display: flex;
            gap: 12px;
        }

        .social-icons a {
            color: #fff;
            font-size: 16px;
        }

        .social-icons a:hover {
            opacity: 0.6;
        }

        /* HERO TEXT */
        .hero-slides-content,
        .hero-slides-content * {
            color: #fff !important;
        }

        section { padding: 100px 0; }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
        }

        /* MUSIC */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .music-card {
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 15px;
        }

        .music-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }

        .music-card h5 {
            margin: 15px 0 10px;
            color: #fff;
        }

        .music-card a {
            display: inline-block;
            padding: 10px 18px;
            background: #fff;
            color: #000;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
        }

        /* CONTACT FORM */
        .contact-wrapper {
            max-width: 600px;
            margin: auto;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: #fff;
            outline: none;
        }

        .contact-form button {
            padding: 14px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }

        /* MAILING LIST */
        #mailing-list {
            background: #0a0a0a;
        }

        #mailing-list h2,
        #mailing-list p {
            color: #fff !important;
        }

        .mailing-form {
            max-width: 500px;
            margin: auto;
            display: flex;
            gap: 10px;
        }

        .mailing-form input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: none;
        }

        .mailing-form button {
            padding: 12px 20px;
            border: none;
            background: #fff;
            color: #000;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<header class="header-area">
    <div class="oneMusic-main-menu">
        <div class="classy-nav-container breakpoint-off">
            <div class="container">

                <nav class="classy-navbar justify-content-between">

                    <div class="brand-wrapper">
                        <a href="#home" class="nav-brand">DANIEL MESCHINO</a>

                        <div class="social-icons">
                            <a href="https://www.instagram.com/danielmeschino/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                            <a href="https://www.tiktok.com/@danielmeschino" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                            <a href="https://open.spotify.com/artist/1FXqrUyXmmA65CgmDt3SDg" target="_blank"><i class="fa-brands fa-spotify"></i></a>
                            <a href="https://www.youtube.com/@danielmeschino" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                        </div>
                    </div>

                    <div class="classy-navbar-toggler">
                        <span class="navbarToggler"><span></span><span></span><span></span></span>
                    </div>

                    <div class="classy-menu">
                        <div class="classycloseIcon">
                            <div class="cross-wrap"><span></span><span></span></div>
                        </div>

                        <div class="classynav">
                            <ul>
                                <li><a href="#home">Home</a></li>
                                <li><a href="#music">Music</a></li>
                                <li><a href="#contact">Contact</a></li>
                                <li><a href="#mailing-list">Mailing List</a></li>
                            </ul>
                        </div>
                    </div>

                </nav>

            </div>
        </div>
    </div>
</header>

<!-- HERO -->
<section id="home" class="hero-area">
    <div class="single-hero-slide d-flex align-items-center justify-content-center">
        <div class="slide-img bg-img"
             style="background-image: url(img/bg-img/YourEverythingCoverArt.JPG);"></div>

        <div class="container text-center">
            <div class="hero-slides-content">
                <h6>Latest Release</h6>
                <h2>YOUR EVERYTHING</h2>

                <a href="https://open.spotify.com/track/4hNGYwcRzgpliOVijt6HEQ"
                   target="_blank"
                   class="btn oneMusic-btn mt-50">
                   Listen Now
                </a>
            </div>
        </div>
    </div>
</section>

<!-- MUSIC -->
<section id="music">
    <div class="container">
        <h2 class="section-title">Music</h2>

        <div class="music-grid">
            <div class="music-card">
                <img src="img/bg-img/YourEverythingCoverArt.JPG">
                <h5>Your Everything</h5>
                <a href="https://open.spotify.com/track/4hNGYwcRzgpliOVijt6HEQ">Listen</a>
            </div>

            <div class="music-card">
                <img src="img/bg-img/WaitForMeCoverArt.JPG">
                <h5>Wait For Me</h5>
                <a href="https://open.spotify.com/track/67spze8p1rBDdjyHWgHvXc">Listen</a>
            </div>

            <div class="music-card">
                <img src="img/bg-img/ShakeCoverArt.JPG">
                <h5>Shake</h5>
                <a href="https://open.spotify.com/track/6I4TyovYNRmlBEb32UaPcb">Listen</a>
            </div>

            <div class="music-card">
                <img src="img/bg-img/AloneCoverArt.JPG">
                <h5>Alone</h5>
                <a href="https://open.spotify.com/track/7LpdTIUenvzztjEUTq8S2F">Listen</a>
            </div>
        </div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <div class="container">
        <h2 class="section-title">Contact</h2>

        <div class="contact-wrapper">
            <form action="https://formspree.io/f/mnjwpkgg" method="POST" class="contact-form">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>
</section>

<!-- MAILING LIST -->
<section id="mailing-list">
    <div class="container text-center">
        <h2 class="section-title">Be First to Hear New Music</h2>

        <form action="https://gmail.us3.list-manage.com/subscribe/post?u=c5b591f801cbd0c441c893b3a&id=c9f2a920a1"
              method="post"
              target="_blank"
              class="mailing-form">

            <input type="email" name="EMAIL" placeholder="Enter your email" required>
            <button type="submit">Subscribe</button>
        </form>
    </div>
</section>

</body>
</html>
