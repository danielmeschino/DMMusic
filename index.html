<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Official music website for Daniel Meschino">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Daniel Meschino | Official Music</title>

    <link rel="icon" href="img/core-img/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Preloader -->
    <div class="preloader d-flex align-items-center justify-content-center">
        <div class="lds-ellipsis">
            <div></div><div></div><div></div><div></div>
        </div>
    </div>

    <!-- Header -->
    <header class="header-area">
        <div class="DanielMeschino-main-menu">
            <div class="classy-nav-container breakpoint-off">
                <div class="container">

                    <nav class="classy-navbar justify-content-between" id="oneMusicNav">

                        <a href="index.html" class="nav-brand">
                            <img src="img/core-img/logo.png" alt="Daniel Meschino">
                        </a>

                        <div class="classy-navbar-toggler">
                            <span class="navbarToggler"><span></span><span></span><span></span></span>
                        </div>

                        <div class="classy-menu">

                            <div class="classycloseIcon">
                                <div class="cross-wrap"><span class="top"></span><span class="bottom"></span></div>
                            </div>

                            <div class="classynav">
                                <ul>
                                    <li><a href="index.html">Home</a></li>
                                    <li><a href="albums-store.html">Music</a></li>
                                    <li><a href="event.html">Shows</a></li>
                                    <li><a href="blog.html">News</a></li>
                                    <li><a href="contact.html">Contact</a></li>
                                </ul>

                                <div class="login-register-cart-button d-flex align-items-center">
                                    <div class="login-register-btn mr-50">
                                        <a href="contact.html">Book Me</a>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </nav>

                </div>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero-area">
        <div class="hero-slides owl-carousel">

            <div class="single-hero-slide d-flex align-items-center justify-content-center">
                <div class="slide-img bg-img" style="background-image: url(img/bg-img/bg-1.jpg);"></div>
                <div class="container">
                    <div class="row">
                        <div class="col-12">
                            <div class="hero-slides-content text-center">
                                <h6 data-animation="fadeInUp">New Music</h6>
                                <h2 data-animation="fadeInUp">Daniel Meschino <span>Official</span></h2>
                                <a href="albums-store.html" class="btn oneMusic-btn mt-50">Listen Now</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- Latest Music -->
    <section class="latest-albums-area section-padding-100">
        <div class="container">

            <div class="section-heading style-2 text-center">
                <p>Latest releases</p>
                <h2>Music</h2>
            </div>

            <div class="row">
                <div class="col-12 text-center">
                    <p>Welcome to my official music website. New songs, shows, and updates coming soon.</p>
                </div>
            </div>

        </div>
    </section>

    <!-- Contact -->
    <section class="contact-area section-padding-100 bg-img bg-overlay" style="background-image: url(img/bg-img/bg-2.jpg);">
        <div class="container">
            <div class="section-heading white text-center">
                <h2>Contact / Bookings</h2>
            </div>

            <div class="contact-form-area">
                <form action="#" method="post">
                    <input class="form-control mb-3" type="text" placeholder="Name">
                    <input class="form-control mb-3" type="email" placeholder="Email">
                    <textarea class="form-control mb-3" rows="6" placeholder="Message"></textarea>
                    <button class="btn oneMusic-btn" type="submit">Send</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer-area">
        <div class="container text-center">
            <p>&copy; 2026 Daniel Meschino. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/jquery/jquery-2.2.4.min.js"></script>
    <script src="js/bootstrap/popper.min.js"></script>
    <script src="js/bootstrap/bootstrap.min.js"></script>
    <script src="js/plugins/plugins.js"></script>
    <script src="js/active.js"></script>

</body>
</html>
