<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Daniel Meschino</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
    scroll-behavior: smooth;
}

body {
    background: #0b0b0f;
    color: white;
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 18px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    z-index: 1000;
}

/* LOGO IMAGE */
.logo img {
    height: 30px;
    width: auto;
    display: block;
}

/* NAV */
nav a {
    margin-left: 20px;
    color: white;
    text-decoration: none;
    opacity: 0.8;
}

nav a:hover {
    opacity: 1;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;

    /* ✅ FIXED PATH */
    background: url("img/bg-img/YourEverythingCoverArt.JPG") center/cover no-repeat;

    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
}

.hero-content {
    position: relative;
    z-index: 2;
}

/* HERO IMAGE */
.hero-content img {
    width: 420px;
    max-width: 80%;
    margin-bottom: 15px;
}

/* SECTIONS */
section {
    padding: 100px 20px;
    max-width: 1000px;
    margin: auto;
}

h2 {
    font-size: 32px;
    margin-bottom: 20px;
}

/* MUSIC */
.music-grid {
    display: grid;
    gap: 20px;
}

iframe {
    width: 100%;
    border-radius: 12px;
}

/* ABOUT */
.about {
    line-height: 1.7;
    opacity: 0.9;
}

/* CONTACT */
.socials a {
    margin-right: 15px;
    color: white;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.4);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    opacity: 0.5;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <!-- ✅ FIXED PATH -->
        <img src="img/bg-img/DanielMeschinoWhiteBG.JPG" alt="Logo">
    </div>

    <nav>
        <a href="#music">Music</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <!-- same image used as artist name -->
        <img src="img/bg-img/DanielMeschinoWhiteBG.JPG" alt="Daniel Meschino">
        <p>New music out now</p>
    </div>
</div>

<!-- MUSIC -->
<section id="music">
    <h2>Music</h2>

    <div class="music-grid">

        <iframe 
        src="https://open.spotify.com/embed/track/placeholder" 
        height="152" frameborder="0"></iframe>

        <iframe 
        height="315" 
        src="https://www.youtube.com/embed/VIDEO_ID" 
        frameborder="0" allowfullscreen></iframe>

    </div>
</section>

<!-- ABOUT -->
<section id="about">
    <h2>About</h2>
    <div class="about">
        <p>
        Write your artist bio here. Keep it clean, emotional, and real.
        </p>
    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact</h2>
    <div class="socials">
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
        <a href="#">YouTube</a>
        <a href="mailto:you@email.com">Email</a>
    </div>
</section>

<footer>
    © 2026 Daniel Meschino. All rights reserved.
</footer>

</body>
</html>
