<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Your Artist Name</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
    scroll-behavior: smooth;
}

body {
    background: #0b0b0f;
    color: white;
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 18px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.logo {
    font-weight: 800;
    letter-spacing: 2px;
}

nav a {
    margin-left: 20px;
    color: white;
    text-decoration: none;
    font-weight: 400;
    opacity: 0.8;
}

nav a:hover {
    opacity: 1;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: url("YourCoverArt.jpg") center/cover no-repeat;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
}

.hero-content {
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-size: 60px;
    font-weight: 800;
}

.hero p {
    margin-top: 10px;
    opacity: 0.8;
}

/* SECTIONS */
section {
    padding: 100px 20px;
    max-width: 1000px;
    margin: auto;
}

h2 {
    font-size: 32px;
    margin-bottom: 20px;
}

/* MUSIC */
.music-grid {
    display: grid;
    gap: 20px;
}

iframe {
    width: 100%;
    border-radius: 12px;
}

/* ABOUT */
.about {
    line-height: 1.6;
    opacity: 0.9;
}

/* CONTACT */
.socials a {
    display: inline-block;
    margin-right: 15px;
    color: white;
    text-decoration: none;
    border-bottom: 1px solid white;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    opacity: 0.5;
}
</style>
</head>

<body>

<header>
    <div class="logo">YOUR NAME</div>
    <nav>
        <a href="#music">Music</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>YOUR ARTIST NAME</h1>
        <p>New music out now</p>
    </div>
</div>

<!-- MUSIC -->
<section id="music">
    <h2>Music</h2>

    <div class="music-grid">

        <!-- Spotify embed -->
        <iframe style="border-radius:12px" 
        src="https://open.spotify.com/embed/track/placeholder" 
        height="152" frameborder="0"></iframe>

        <!-- YouTube embed -->
        <iframe height="315" 
        src="https://www.youtube.com/embed/VIDEO_ID" 
        frameborder="0" allowfullscreen></iframe>

    </div>
</section>

<!-- ABOUT -->
<section id="about">
    <h2>About</h2>
    <div class="about">
        <p>
        Write your artist bio here. Keep it short, emotional, and real.
        Talk about your sound, influences, and story.
        </p>
    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact</h2>
    <div class="socials">
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
        <a href="#">YouTube</a>
        <a href="mailto:you@email.com">Email</a>
    </div>
</section>

<footer>
    © 2026 YOUR NAME. All rights reserved.
</footer>

</body>
</html>
